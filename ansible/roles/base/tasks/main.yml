---
- name: Install base packages
  ansible.builtin.apt:
    name: "{{ platform_base_packages }}"
    state: present
    update_cache: true

- name: Set host timezone
  community.general.timezone:
    name: "{{ platform_timezone }}"

- name: Ensure platform groups exist
  ansible.builtin.group:
    name: docker
    state: present

- name: Create homelab admin user when enabled
  ansible.builtin.user:
    name: "{{ platform_admin_user }}"
    shell: /bin/bash
    groups: "{{ platform_admin_groups }}"
    append: true
    create_home: true
    state: present
  when: platform_manage_admin_user

- name: Install authorized keys for managed admin user
  ansible.posix.authorized_key:
    user: "{{ platform_admin_user }}"
    state: present
    key: "{{ item }}"
  loop: "{{ platform_admin_authorized_keys }}"
  when: platform_manage_admin_user

- name: Configure external drive mounts in fstab
  ansible.posix.mount:
    path: "{{ item.mount }}"
    src: "UUID={{ item.uuid }}"
    fstype: "{{ item.fstype }}"
    opts: defaults,nofail,x-systemd.device-timeout=30s
    state: mounted
  loop: "{{ platform_external_drives }}"
  when: platform_external_drives is defined

- name: Disable WiFi power management
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/wifi-powersave-off.conf
    content: |
      [connection]
      wifi.powersave = 2
    owner: root
    group: root
    mode: "0644"
  notify: restart NetworkManager
  when: platform_wifi_disable_powersave | default(true)

- name: Prevent NetworkManager from managing Docker interfaces
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/docker-unmanaged.conf
    content: |
      [keyfile]
      unmanaged-devices=interface-name:docker*;interface-name:veth*;interface-name:br-*
    owner: root
    group: root
    mode: "0644"
  notify: restart NetworkManager

- name: Install NetworkManager restart service
  ansible.builtin.copy:
    dest: /etc/systemd/system/networkmanager-restart.service
    content: |
      [Unit]
      Description=Restart NetworkManager to prevent WiFi degradation
      [Service]
      Type=oneshot
      ExecStart=/bin/systemctl restart NetworkManager
    owner: root
    group: root
    mode: "0644"
  when: platform_wifi_disable_powersave | default(true)

- name: Install NetworkManager restart timer (every 12 hours)
  ansible.builtin.copy:
    dest: /etc/systemd/system/networkmanager-restart.timer
    content: |
      [Unit]
      Description=Restart NetworkManager to prevent WiFi stack degradation
      [Timer]
      OnCalendar=*-*-* 04:00:00
      OnCalendar=*-*-* 16:00:00
      Persistent=true
      [Install]
      WantedBy=timers.target
    owner: root
    group: root
    mode: "0644"
  when: platform_wifi_disable_powersave | default(true)

- name: Install VPN health check script
  ansible.builtin.copy:
    dest: /usr/local/bin/self-hosted-vpn-healthcheck
    content: |
      #!/usr/bin/env bash
      # Check if gluetun VPN is healthy. If not, restart gluetun and transmission.
      set -euo pipefail

      gluetun_status=$(docker inspect --format='{{ '{{' }}.State.Health.Status{{ '}}' }}' homelab-gluetun-1 2>/dev/null || echo "missing")

      if [ "$gluetun_status" != "healthy" ]; then
        echo "$(date -Iseconds) VPN unhealthy (status: $gluetun_status), restarting gluetun + transmission"
        docker restart homelab-gluetun-1
        sleep 15
        docker restart homelab-transmission-1 2>/dev/null || true
      fi
    owner: root
    group: root
    mode: "0755"

- name: Install VPN health check service
  ansible.builtin.copy:
    dest: /etc/systemd/system/self-hosted-vpn-healthcheck.service
    content: |
      [Unit]
      Description=Check VPN health and restart if needed
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/self-hosted-vpn-healthcheck
    owner: root
    group: root
    mode: "0644"

- name: Install VPN health check timer (every 5 minutes)
  ansible.builtin.copy:
    dest: /etc/systemd/system/self-hosted-vpn-healthcheck.timer
    content: |
      [Unit]
      Description=Check VPN health every 5 minutes
      [Timer]
      OnBootSec=60
      OnUnitActiveSec=300
      [Install]
      WantedBy=timers.target
    owner: root
    group: root
    mode: "0644"

- name: Enable VPN health check timer
  ansible.builtin.systemd:
    name: self-hosted-vpn-healthcheck.timer
    state: started
    enabled: true
    daemon_reload: true

- name: Enable daily NetworkManager restart timer
  ansible.builtin.systemd:
    name: networkmanager-restart.timer
    state: started
    enabled: true
    daemon_reload: true
  when: platform_wifi_disable_powersave | default(true)

- name: Create platform directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ platform_install_root }}"
    - "{{ platform_config_root }}"
    - "{{ platform_data_root }}"
    - "{{ platform_backup_root }}"
    - "{{ platform_media_root }}"
    - "{{ platform_compose_root }}"
    - "{{ platform_secrets_root }}"

- name: Create managed service directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ platform_managed_directories }}"

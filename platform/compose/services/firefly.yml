services:
  firefly:
    image: fireflyiii/core:latest
    restart: unless-stopped
    env_file:
      - ${PLATFORM_SECRETS_ROOT}/firefly.env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: firefly-db
      DB_PORT: 5432
      DB_DATABASE: firefly
      DB_USERNAME: firefly
      APP_URL: https://finance.lab.chaseconover.com
    volumes:
      - ${PLATFORM_DATA_ROOT}/firefly/upload:/var/www/html/storage/upload
    networks:
      - internal
    depends_on:
      firefly-db:
        condition: service_healthy

  firefly-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${PLATFORM_SECRETS_ROOT}/firefly.env
    volumes:
      - ${PLATFORM_DATA_ROOT}/firefly/db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U firefly"]
      interval: 10s
      start_period: 30s

  firefly-cron:
    image: alpine:latest
    restart: unless-stopped
    env_file:
      - ${PLATFORM_SECRETS_ROOT}/firefly.env
    command: >
      sh -c "echo '0 * * * * wget -qO- http://firefly:8080/api/v1/cron/$${STATIC_CRON_TOKEN}' | crontab - && crond -f -L /dev/stdout"
    networks:
      - internal
    depends_on:
      - firefly
